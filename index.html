<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning, Cindy!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --cream: #FAF7F2;
    --warm-brown: #8B6F47;
    --deep-brown: #5C4033;
    --burgundy: #7A2E3B;
    --olive: #6B7B3A;
    --gold: #C9A96E;
    --soft-white: #FFFFFF;
    --text-dark: #2C2420;
    --text-muted: #8A7D74;
    --border: #E8E0D6;
    --card-shadow: 0 2px 20px rgba(92,64,51,0.08);
    --hover-shadow: 0 8px 32px rgba(92,64,51,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--deep-brown) 0%, var(--warm-brown) 50%, var(--burgundy) 100%);
    color: white;
    padding: 40px 50px 30px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-content {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }
  .greeting {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .date-line {
    font-size: 1.05rem;
    font-weight: 300;
    opacity: 0.85;
    letter-spacing: 0.5px;
  }

  /* MAIN GRID */
  .dashboard {
    max-width: 1400px;
    margin: -20px auto 40px;
    padding: 0 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto;
    gap: 24px;
    position: relative;
    z-index: 2;
  }

  .card {
    background: var(--soft-white);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 28px;
    transition: box-shadow 0.3s ease;
  }
  .card:hover { box-shadow: var(--hover-shadow); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--deep-brown);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
  }

  /* WEATHER CARD */
  .weather-card { grid-column: 1; grid-row: 1; }
  .weather-icon-bg { background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
  }
  .weather-temp {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--deep-brown);
    line-height: 1;
  }
  .weather-temp sup {
    font-size: 1.8rem;
    font-weight: 400;
  }
  .weather-desc {
    font-size: 1.1rem;
    color: var(--text-muted);
    text-transform: capitalize;
    margin-bottom: 4px;
  }
  .weather-detail {
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .weather-emoji {
    font-size: 4rem;
    line-height: 1;
  }
  .weather-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .weather-stat {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .weather-stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .weather-stat-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--deep-brown);
  }

  /* CALENDAR CARD */
  .calendar-card { grid-column: 2; grid-row: 1; }
  .cal-icon-bg { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .event-list { list-style: none; }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .event-item:last-child { border-bottom: none; }
  .event-time {
    min-width: 80px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--burgundy);
    padding-top: 2px;
  }
  .event-name {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-dark);
  }
  .event-detail {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .event-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-meeting { background: #FFF3E0; color: #E65100; }
  .badge-allday { background: #E8F5E9; color: #2E7D32; }
  .badge-call { background: #E3F2FD; color: #1565C0; }

  /* OUTFIT CARD */
  .outfit-card { grid-column: 1; grid-row: 2; }
  .outfit-icon-bg { background: linear-gradient(135deg, #FCE4EC, #F8BBD0); }

  .roulette-container {
    position: relative;
    text-align: center;
  }
  .outfit-reason {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.5;
    font-style: italic;
  }
  .outfit-display {
    position: relative;
    width: 100%;
    height: 380px;
    overflow: hidden;
    border-radius: 12px;
    margin-bottom: 16px;
    background: var(--cream);
  }
  .outfit-strip {
    display: flex;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .outfit-slide {
    width: 100%;
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .outfit-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }
  .outfit-label {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--deep-brown);
    margin-bottom: 16px;
    min-height: 24px;
  }
  .spin-btn {
    background: linear-gradient(135deg, var(--burgundy), var(--deep-brown));
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
  }
  .spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(122,46,59,0.3);
  }
  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .spin-btn .spinner-icon {
    display: inline-block;
    margin-right: 6px;
  }
  .weather-match-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 8px;
  }
  .tag-cold { background: #E3F2FD; color: #1565C0; }
  .tag-cool { background: #FFF3E0; color: #E65100; }
  .tag-warm { background: #FFF8E1; color: #F57F17; }
  .tag-rain { background: #E0F7FA; color: #00695C; }

  /* TASKS CARD */
  .tasks-card { grid-column: 2; grid-row: 2; }
  .tasks-icon-bg { background: linear-gradient(135deg, #EDE7F6, #D1C4E9); }
  .task-section-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
    margin-top: 16px;
  }
  .task-section-title:first-child { margin-top: 0; }
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .task-item:last-child { border-bottom: none; }
  .task-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .task-item.overdue .task-checkbox { border-color: #E57373; }
  .task-item.today-task .task-checkbox { border-color: var(--gold); }
  .task-name { flex: 1; }
  .task-date {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .task-date.overdue-date { color: #E57373; font-weight: 500; }
  .task-count-badge {
    display: inline-block;
    background: var(--cream);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 6px;
  }

  /* LOADING STATE */
  .loading-pulse {
    background: linear-gradient(90deg, var(--cream) 25%, #f0ebe4 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: pulse 1.5s infinite;
    border-radius: 8px;
    height: 20px;
    margin-bottom: 8px;
  }
  @keyframes pulse {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* REFRESH INFO */
  .refresh-bar {
    text-align: center;
    padding: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .refresh-bar a {
    color: var(--burgundy);
    text-decoration: none;
    font-weight: 500;
  }

  @media (max-width: 900px) {
    .dashboard {
      grid-template-columns: 1fr;
    }
    .weather-card, .calendar-card, .outfit-card, .tasks-card {
      grid-column: 1;
      grid-row: auto;
    }
    .header { padding: 30px 20px 25px; }
    .greeting { font-size: 2rem; }
    .dashboard { padding: 0 16px; }
  }
</style>
</head>

// ============================================================
// GREETING & DATE
// ============================================================
function updateGreeting() {
  const now = new Date();
  const hour = now.getHours();
  let greet = "Good Morning";
  if (hour >= 12 && hour < 17) greet = "Good Afternoon";
  if (hour >= 17) greet = "Good Evening";
  document.getElementById('greeting').textContent = greet + ", Cindy!";

  const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
  document.getElementById('dateLine').textContent = now.toLocaleDateString('en-US', options);

  const refreshDate = new Date(DATA_REFRESH_TIME);
  document.getElementById('lastRefresh').textContent = refreshDate.toLocaleString('en-US', {
    month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true
  });
}

// ============================================================
// WEATHER (Open-Meteo â free, no API key)
// ============================================================
let currentWeather = null;

async function fetchWeather() {
  try {
    // Kansas City, MO coordinates (zip 64108)
    const lat = 39.0997;
    const lon = -94.5786;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,rain,snowfall,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FChicago&forecast_days=1`;

    const resp = await fetch(url);
    const data = await resp.json();
    currentWeather = data;
    renderWeather(data);
  } catch (e) {
    document.getElementById('weatherContent').innerHTML = `<p style="color:var(--text-muted);">Unable to load weather. <a href="javascript:fetchWeather()">Retry</a></p>`;
  }
}

function getWeatherEmoji(code) {
  if (code <= 1) return "&#9728;&#65039;";
  if (code <= 3) return "&#9925;";
  if (code >= 51 && code <= 67) return "&#127783;&#65039;";
  if (code >= 71 && code <= 77) return "&#127784;&#65039;";
  if (code >= 80 && code <= 82) return "&#127783;&#65039;";
  if (code >= 85 && code <= 86) return "&#127784;&#65039;";
  if (code >= 95) return "&#9889;";
  if (code >= 45 && code <= 48) return "&#127787;&#65039;";
  return "&#9728;&#65039;";
}

function getWeatherDesc(code) {
  const map = {
    0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
    45: "Fog", 48: "Depositing rime fog",
    51: "Light drizzle", 53: "Moderate drizzle", 55: "Dense drizzle",
    61: "Slight rain", 63: "Moderate rain", 65: "Heavy rain",
    71: "Slight snow", 73: "Moderate snow", 75: "Heavy snow",
    77: "Snow grains", 80: "Slight rain showers", 81: "Moderate rain showers",
    82: "Violent rain showers", 85: "Slight snow showers", 86: "Heavy snow showers",
    95: "Thunderstorm", 96: "Thunderstorm w/ slight hail", 99: "Thunderstorm w/ heavy hail"
  };
  return map[code] || "Unknown";
}

function renderWeather(data) {
  const c = data.current;
  const d = data.daily;
  const code = c.weather_code;

  document.getElementById('weatherContent').innerHTML = `
    <div class="weather-main">
      <div>
        <div class="weather-temp">${Math.round(c.temperature_2m)}<sup>&deg;F</sup></div>
        <div class="weather-desc">${getWeatherDesc(code)}</div>
        <div class="weather-detail">Feels like ${Math.round(c.apparent_temperature)}&deg;F</div>
      </div>
      <div class="weather-emoji">${getWeatherEmoji(code)}</div>
    </div>
    <div class="weather-grid">
      <div class="weather-stat">
        <div class="weather-stat-label">High / Low</div>
        <div class="weather-stat-value">${Math.round(d.temperature_2m_max[0])}&deg; / ${Math.round(d.temperature_2m_min[0])}&deg;</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Rain Chance</div>
        <div class="weather-stat-value">${d.precipitation_probability_max[0]}%</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Wind</div>
        <div class="weather-stat-value">${Math.round(c.wind_speed_10m)} mph</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Humidity</div>
        <div class="weather-stat-value">${c.relative_humidity_2m}%</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Precipitation</div>
        <div class="weather-stat-value">${d.precipitation_sum[0]}"</div>
      </div>
      <div class="weather-stat">
        <div class="weather-stat-label">Snow</div>
        <div class="weather-stat-value">${c.snowfall > 0 ? c.snowfall + '"' : 'None'}</div>
      </div>
    </div>
  `;
}

// ============================================================
// CALENDAR
// ============================================================
function renderCalendar() {
  const html = CALENDAR_DATA.map(ev => {
    let badgeClass = 'badge-allday';
    let badgeText = 'All Day';
    if (ev.type === 'meeting') { badgeClass = 'badge-meeting'; badgeText = 'Meeting'; }
    if (ev.type === 'call') { badgeClass = 'badge-call'; badgeText = 'Call'; }

    return `
      <li class="event-item">
        <div class="event-time">${ev.time}</div>
        <div>
          <div class="event-name">${ev.name}</div>
          ${ev.detail ? `<div class="event-detail">${ev.detail}</div>` : ''}
          <span class="event-badge ${badgeClass}">${badgeText}</span>
        </div>
      </li>`;
  }).join('');

  document.getElementById('calendarContent').innerHTML = `<ul class="event-list">${html}</ul>`;
}

// ============================================================
// TASKS
// ============================================================
function renderTasks() {
  let html = '';

  html += `<div class="task-section-title">Today <span class="task-count-badge">${TASKS_TODAY.length}</span></div>`;
  html += '<ul class="task-list">';
  TASKS_TODAY.forEach(t => {
    html += `<li class="task-item today-task">
      <div class="task-checkbox"></div>
      <span class="task-name">${t.name}</span>
      <span class="task-date">Today</span>
    </li>`;
  });
  html += '</ul>';

  if (TASKS_OVERDUE.length > 0) {
    html += `<div class="task-section-title">Overdue <span class="task-count-badge">${TASKS_OVERDUE.length}</span></div>`;
    html += '<ul class="task-list">';
    TASKS_OVERDUE.forEach(t => {
      html += `<li class="task-item overdue">
        <div class="task-checkbox"></div>
        <span class="task-name">${t.name}</span>
        <span class="task-date overdue-date">${t.date}</span>
      </li>`;
    });
    html += '</ul>';
  }

  document.getElementById('tasksContent').innerHTML = html;
}

// ============================================================
// OUTFIT ROULETTE
// ============================================================
let selectedCategory = [];
let spinning = false;

function determineOutfitCategory() {
  if (!currentWeather) return OUTFITS.cool_professional;

  const temp = currentWeather.current.temperature_2m;
  const code = currentWeather.current.weather_code;
  const isRainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;
  const isSnowy = (code >= 71 && code <= 77) || (code >= 85 && code <= 86);

  // Check calendar for meetings â professional
  const hasMeetings = CALENDAR_DATA.some(e =>
    e.type === 'meeting' || e.type === 'call'
  );

  if (isRainy || isSnowy) return OUTFITS.rainy;
  if (temp < 40) return hasMeetings ? OUTFITS.cold_professional : OUTFITS.cold_casual;
  if (temp < 60) return hasMeetings ? OUTFITS.cool_professional : OUTFITS.cool_casual;
  return hasMeetings ? OUTFITS.warm_professional : OUTFITS.warm_casual;
}

function getOutfitReasonText() {
  if (!currentWeather) return "Loading weather to match your outfit...";

  const temp = Math.round(currentWeather.current.temperature_2m);
  const code = currentWeather.current.weather_code;
  const isRainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;
  const isSnowy = (code >= 71 && code <= 77) || (code >= 85 && code <= 86);

  const hasMeetings = CALENDAR_DATA.some(e => e.type === 'meeting');
  const meetingNames = CALENDAR_DATA.filter(e => e.type === 'meeting').map(e => e.name);

  let reason = `It's ${temp}Â°F outside`;
  if (isRainy) reason += " with rain in the forecast";
  else if (isSnowy) reason += " with snow expected";
  reason += ". ";

  if (hasMeetings) {
    reason += `You've got meetings today (${meetingNames.slice(0,2).join(', ')}${meetingNames.length > 2 ? '...' : ''}), so let's keep it polished.`;
  } else {
    reason += "No major meetings â feel free to keep it relaxed today.";
  }

  return reason;
}

function getWeatherTag() {
  if (!currentWeather) return '';
  const temp = currentWeather.current.temperature_2m;
  const code = currentWeather.current.weather_code;
  const isRainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;

  if (isRainy) return '<span class="weather-match-tag tag-rain">Rain-Ready Pick</span>';
  if (temp < 40) return '<span class="weather-match-tag tag-cold">Cold Weather Pick</span>';
  if (temp < 60) return '<span class="weather-match-tag tag-cool">Cool Weather Pick</span>';
  return '<span class="weather-match-tag tag-warm">Warm Weather Pick</span>';
}

function initOutfitDisplay() {
  selectedCategory = determineOutfitCategory();
  const strip = document.getElementById('outfitStrip');
  const display = document.getElementById('outfitDisplay');
  const displayWidth = display.offsetWidth;

  // Build strip with all outfits repeated for roulette effect
  let slidesHtml = '';
  const repeats = 4;
  for (let r = 0; r < repeats; r++) {
    selectedCategory.forEach(outfit => {
      slidesHtml += `<div class="outfit-slide" style="width:${displayWidth}px;min-width:${displayWidth}px;">
        <img src="${outfit.src}" alt="${outfit.label}" loading="lazy">
      </div>`;
    });
  }
  strip.innerHTML = slidesHtml;
  strip.style.transform = 'translateX(0px)';

  document.getElementById('outfitReason').textContent = getOutfitReasonText();
  document.getElementById('outfitLabel').innerHTML = 'Hit the button to spin your style wheel!' + '<br>' + getWeatherTag();
}

function spinRoulette() {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-icon">&#127922;</span> Spinning...';

  const strip = document.getElementById('outfitStrip');
  const display = document.getElementById('outfitDisplay');
  const displayWidth = display.offsetWidth;
  const totalSlides = selectedCategory.length;

  // Pick a random winner
  const winnerIdx = Math.floor(Math.random() * totalSlides);

  // Spin through 2-3 full cycles + land on winner
  const fullCycles = 2 + Math.floor(Math.random() * 2);
  const targetSlide = (fullCycles * totalSlides) + winnerIdx;
  const offset = targetSlide * displayWidth;

  strip.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.6, 0.25, 1)';
  strip.style.transform = `translateX(-${offset}px)`;

  setTimeout(() => {
    spinning = false;
    btn.disabled = false;
    btn.innerHTML = '<span class="spinner-icon">&#127922;</span> Spin Again';
    const winner = selectedCategory[winnerIdx];
    document.getElementById('outfitLabel').innerHTML = winner.label + '<br>' + getWeatherTag();
  }, 3800);
}

// ============================================================
// INIT
// ============================================================
async function init() {
  updateGreeting();
  renderCalendar();
  renderTasks();
  await fetchWeather();
  initOutfitDisplay();
}

init();
</script>
