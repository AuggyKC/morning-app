<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Good Morning, Cindy!</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap');

  :root {
    --cream: #FAF7F2;
    --warm-brown: #8B6F47;
    --deep-brown: #5C4033;
    --burgundy: #7A2E3B;
    --olive: #6B7B3A;
    --gold: #C9A96E;
    --soft-white: #FFFFFF;
    --text-dark: #2C2420;
    --text-muted: #8A7D74;
    --border: #E8E0D6;
    --card-shadow: 0 2px 20px rgba(92,64,51,0.08);
    --hover-shadow: 0 8px 32px rgba(92,64,51,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    background: var(--cream);
    color: var(--text-dark);
    min-height: 100vh;
    padding: 0;
  }

  /* HEADER */
  .header {
    background: linear-gradient(135deg, var(--deep-brown) 0%, var(--warm-brown) 50%, var(--burgundy) 100%);
    color: white;
    padding: 40px 50px 30px;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50%;
    right: -10%;
    width: 400px;
    height: 400px;
    background: radial-gradient(circle, rgba(201,169,110,0.2) 0%, transparent 70%);
    border-radius: 50%;
  }
  .header-content {
    position: relative;
    z-index: 1;
    max-width: 1400px;
    margin: 0 auto;
  }
  .greeting {
    font-family: 'Playfair Display', serif;
    font-size: 2.8rem;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .date-line {
    font-size: 1.05rem;
    font-weight: 300;
    opacity: 0.85;
    letter-spacing: 0.5px;
  }

  /* MAIN GRID */
  .dashboard {
    max-width: 1400px;
    margin: -20px auto 40px;
    padding: 0 30px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: auto auto auto;
    gap: 24px;
    position: relative;
    z-index: 2;
  }

  .card {
    background: var(--soft-white);
    border-radius: 16px;
    box-shadow: var(--card-shadow);
    padding: 28px;
    transition: box-shadow 0.3s ease;
  }
  .card:hover { box-shadow: var(--hover-shadow); }

  .card-title {
    font-family: 'Playfair Display', serif;
    font-size: 1.35rem;
    font-weight: 600;
    color: var(--deep-brown);
    margin-bottom: 18px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .card-icon {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.1rem;
  }

  /* WEATHER CARD */
  .weather-card { grid-column: 1; grid-row: 2; }
  .weather-icon-bg { background: linear-gradient(135deg, #FFF3E0, #FFE0B2); }
  .weather-main {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 20px;
  }
  .weather-temp {
    font-family: 'Playfair Display', serif;
    font-size: 4rem;
    font-weight: 700;
    color: var(--deep-brown);
    line-height: 1;
  }
  .weather-temp sup {
    font-size: 1.8rem;
    font-weight: 400;
  }
  .weather-desc {
    font-size: 1.1rem;
    color: var(--text-muted);
    text-transform: capitalize;
    margin-bottom: 4px;
  }
  .weather-detail {
    font-size: 0.9rem;
    color: var(--text-muted);
  }
  .weather-emoji {
    font-size: 4rem;
    line-height: 1;
  }
  .weather-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }
  .weather-stat {
    background: var(--cream);
    border-radius: 10px;
    padding: 12px 14px;
    text-align: center;
  }
  .weather-stat-label {
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .weather-stat-value {
    font-size: 1.1rem;
    font-weight: 600;
    color: var(--deep-brown);
  }

  /* CALENDAR CARD */
  .calendar-card { grid-column: 2; grid-row: 2; }
  .cal-icon-bg { background: linear-gradient(135deg, #E8F5E9, #C8E6C9); }
  .event-list { list-style: none; }
  .event-item {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .event-item:last-child { border-bottom: none; }
  .event-time {
    min-width: 80px;
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--burgundy);
    padding-top: 2px;
  }
  .event-name {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--text-dark);
  }
  .event-detail {
    font-size: 0.8rem;
    color: var(--text-muted);
    margin-top: 2px;
  }
  .event-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.7rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .badge-meeting { background: #FFF3E0; color: #E65100; }
  .badge-allday { background: #E8F5E9; color: #2E7D32; }
  .badge-call { background: #E3F2FD; color: #1565C0; }

  /* OUTFIT CARD */
  .outfit-card { grid-column: 1; grid-row: 3; }
  .outfit-icon-bg { background: linear-gradient(135deg, #FCE4EC, #F8BBD0); }

  .roulette-container {
    position: relative;
    text-align: center;
  }
  .outfit-reason {
    font-size: 0.9rem;
    color: var(--text-muted);
    margin-bottom: 16px;
    line-height: 1.5;
    font-style: italic;
  }
  .outfit-display {
    position: relative;
    width: 100%;
    height: 380px;
    overflow: hidden;
    border-radius: 12px;
    margin-bottom: 16px;
    background: var(--cream);
  }
  .outfit-strip {
    display: flex;
    position: absolute;
    top: 0;
    left: 0;
    height: 100%;
    transition: transform 3s cubic-bezier(0.25, 0.1, 0.25, 1);
  }
  .outfit-slide {
    width: 100%;
    min-width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 10px;
  }
  .outfit-slide img {
    max-width: 100%;
    max-height: 100%;
    object-fit: contain;
    border-radius: 8px;
  }
  .outfit-label {
    font-size: 0.95rem;
    font-weight: 500;
    color: var(--deep-brown);
    margin-bottom: 16px;
    min-height: 24px;
  }
  .spin-btn {
    background: linear-gradient(135deg, var(--burgundy), var(--deep-brown));
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-family: 'Inter', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    letter-spacing: 0.3px;
  }
  .spin-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(122,46,59,0.3);
  }
  .spin-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
  .spin-btn .spinner-icon {
    display: inline-block;
    margin-right: 6px;
  }
  .weather-match-tag {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 600;
    margin-top: 8px;
  }
  .tag-cold { background: #E3F2FD; color: #1565C0; }
  .tag-cool { background: #FFF3E0; color: #E65100; }
  .tag-warm { background: #FFF8E1; color: #F57F17; }
  .tag-rain { background: #E0F7FA; color: #00695C; }

  /* TASKS CARD */
  .tasks-card { grid-column: 2; grid-row: 3; }
  .tasks-icon-bg { background: linear-gradient(135deg, #EDE7F6, #D1C4E9); }

  /* HOROSCOPE CARD */
  .horoscope-card { grid-column: 1; grid-row: 1; }
  .horoscope-icon-bg { background: linear-gradient(135deg, #EDE7F6, #C5CAE9); }
  .horoscope-sign {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--gold);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 10px;
  }
  .horoscope-text {
    font-size: 1rem;
    line-height: 1.65;
    color: var(--text-dark);
  }
  .horoscope-source {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-top: 14px;
    font-style: italic;
  }

  /* BIORHYTHM CARD */
  .biorhythm-card { grid-column: 2; grid-row: 1; }
  .biorhythm-icon-bg { background: linear-gradient(135deg, #E0F2F1, #B2DFDB); }
  .bio-chart { width: 100%; height: 132px; display: block; margin-bottom: 14px; }
  .bio-legend { display: flex; gap: 18px; flex-wrap: wrap; }
  .bio-chip { display: flex; align-items: center; gap: 7px; font-size: 0.86rem; font-weight: 600; color: var(--deep-brown); }
  .bio-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
  .bio-pct { color: var(--text-muted); font-weight: 500; }
  .task-section-title {
    font-size: 0.8rem;
    font-weight: 600;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 10px;
    margin-top: 16px;
  }
  .task-section-title:first-child { margin-top: 0; }
  .task-list { list-style: none; }
  .task-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.9rem;
  }
  .task-item:last-child { border-bottom: none; }
  .task-checkbox {
    width: 18px;
    height: 18px;
    border: 2px solid var(--border);
    border-radius: 50%;
    flex-shrink: 0;
  }
  .task-item.overdue .task-checkbox { border-color: #E57373; }
  .task-item.today-task .task-checkbox { border-color: var(--gold); }
  .task-name { flex: 1; }
  .task-date {
    font-size: 0.75rem;
    color: var(--text-muted);
  }
  .task-date.overdue-date { color: #E57373; font-weight: 500; }
  .task-count-badge {
    display: inline-block;
    background: var(--cream);
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 0.75rem;
    color: var(--text-muted);
    margin-left: 6px;
  }

  /* LOADING STATE */
  .loading-pulse {
    background: linear-gradient(90deg, var(--cream) 25%, #f0ebe4 50%, var(--cream) 75%);
    background-size: 200% 100%;
    animation: pulse 1.5s infinite;
    border-radius: 8px;
    height: 20px;
    margin-bottom: 8px;
  }
  @keyframes pulse {
    0% { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  /* REFRESH INFO */
  .refresh-bar {
    text-align: center;
    padding: 16px;
    font-size: 0.8rem;
    color: var(--text-muted);
  }
  .refresh-bar a {
    color: var(--burgundy);
    text-decoration: none;
    font-weight: 500;
  }

  @media (max-width: 900px) {
    .dashboard {
      grid-template-columns: 1fr;
    }
    .horoscope-card, .biorhythm-card, .weather-card, .calendar-card, .outfit-card, .tasks-card {
      grid-column: 1;
      grid-row: auto;
    }
    .header { padding: 30px 20px 25px; }
    .greeting { font-size: 2rem; }
    .dashboard { padding: 0 16px; }
  }
</style>
</head>

  </div>

  <!-- TASKS -->

    </div>
    <div id="tasksContent">

    </div>
  </div>

</div>

<div class="refresh-bar">
  Last data refresh: <span id="lastRefresh"></span> &bull;

// Daily-seeded shuffle: picks a different set of 8 outfits each day
function dailySeedShuffle(arr) {
  const today = new Date();
  const seed = today.getFullYear() * 10000 + (today.getMonth() + 1) * 100 + today.getDate();
  // Simple seeded PRNG (mulberry32)
  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }
  const rng = mulberry32(seed);
  const shuffled = [...arr];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  return shuffled;
}

function getWeatherTier(temp) {
  if (temp < 50) return 'cold';
  if (temp < 65) return 'cool';
  if (temp < 80) return 'warm';
  return 'hot';
}

function hasLargeTempSwing() {
  if (!currentWeather) return false;
  const high = currentWeather.daily.temperature_2m_max[0];
  const low = currentWeather.daily.temperature_2m_min[0];
  return (high - low) > 15;
}

// Sports / kids-activity keywords — events matching these don't trigger "polished"
// on the weekend. Edit this list to fine-tune what counts as a casual-day event.
const SPORTS_KEYWORDS = [
  'game', 'practice', 'tournament', 'meet', 'match', 'scrimmage',
  'soccer', 'football', 'baseball', 'basketball', 'hockey', 'volleyball',
  'lacrosse', 'tennis', 'golf', 'track', 'cross country', 'race', 'run',
  'swim', 'swimming', 'gymnastics', 'dance class', 'fifa', 'sport',
  'gunner', 'isabella', 'izzy'  // names from kids' calendar items
];

function isSportsEvent(ev) {
  const text = ((ev.name || '') + ' ' + (ev.detail || '')).toLowerCase();
  return SPORTS_KEYWORDS.some(kw => text.includes(kw));
}

function isWeekend() {
  const day = new Date().getDay();
  return day === 0 || day === 6; // Sunday or Saturday
}

// Casual days (Cindy's preference): Friday, Saturday, Sunday pull primarily
// from the casual/weekend board.
function isCasualDay() {
  const day = new Date().getDay();
  return day === 5 || day === 6 || day === 0; // Friday, Saturday, Sunday
}

// Social / personal keywords — events matching these are NOT professional
// meetings, so they don't make the day "polished" even if the calendar happens
// to tag them as a meeting (e.g. a block party or dinner that got typed as one).
const NON_WORK_KEYWORDS = [
  'block party', 'party', 'birthday', 'bday', 'bbq', 'barbecue', 'cookout',
  'potluck', 'picnic', 'dinner', 'lunch', 'brunch', 'breakfast', 'coffee',
  'happy hour', 'drinks', 'date night', 'playdate', 'play date', 'sleepover',
  'hangout', 'get together', 'get-together', 'wedding', 'shower', 'graduation',
  'recital', 'concert', 'movie', 'vacation', 'holiday', 'church', 'mass',
  'reunion', 'gathering', 'celebration', 'festival', 'fair'
];

// "Hold-" / "Hold:" / "Hold " prefixed items are tentative placeholders,
// not confirmed professional meetings.
function isTentativeHold(ev) {
  return /^\s*hold[\s:\-]/i.test(ev.name || '');
}

function isSocialEvent(ev) {
  const text = ((ev.name || '') + ' ' + (ev.detail || '')).toLowerCase();
  return NON_WORK_KEYWORDS.some(kw => text.includes(kw));
}

// A genuine professional meeting: tagged as a meeting/call AND not a kids'/sports
// item, a social/personal event, or a tentative hold. Only these flip a day to
// "polished" — everything else leaves it on the weekend/casual board.
function isProfessionalMeeting(ev) {
  if (ev.type !== 'meeting' && ev.type !== 'call') return false;
  if (isSportsEvent(ev)) return false;
  if (isSocialEvent(ev)) return false;
  if (isTentativeHold(ev)) return false;
  return true;
}

// Get today's outfit selection (8 outfits).
// Fri/Sat/Sun → casual/weekend board only. Mon–Thu → weather board chosen by
// the day's HIGH temp (the polished board is retired; the weather boards now
// cover that area).
function getTodaysOutfits() {
  let matched;

  if (isCasualDay()) {
    // Weekend (Fri/Sat/Sun): pull only from the casual/weekend board.
    matched = OUTFITS_BY_SECTION.casual || [];
  } else {
    // Weekday (Mon–Thu): pick the weather board from the day's HIGH temp.
    let weatherTier = 'warm'; // safe default if weather hasn't loaded
    if (currentWeather) {
      // Board follows the day's HIGH (max) temp — dress for the warmest part
      // of the day. A big morning-to-afternoon swing only adds a layering hint
      // in the caption; it no longer pulls a hot day onto a cooler board.
      const high = currentWeather.daily.temperature_2m_max[0];
      weatherTier = getWeatherTier(high);
    }
    matched = OUTFITS_BY_SECTION[weatherTier] || [];
  }

  // Fallback: the full flat board if the chosen section is too small.
  if (matched.length < 4) matched = ALL_OUTFITS;

  const shuffled = dailySeedShuffle(matched);
  return shuffled.slice(0, 8).map((url, i) => ({
    src: url,
    label: `Look ${i + 1} from your board`
  }));
}

let currentWeather = null;

async function fetchWeather() {
  try {
    // Kansas City, MO coordinates (zip 64108)
    const lat = 39.0997;
    const lon = -94.5786;
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,apparent_temperature,precipitation,rain,snowfall,weather_code,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min,precipitation_sum,precipitation_probability_max,weather_code&temperature_unit=fahrenheit&wind_speed_unit=mph&precipitation_unit=inch&timezone=America%2FChicago&forecast_days=1`;

    const resp = await fetch(url);
    const data = await resp.json();
    currentWeather = data;
    renderWeather(data);
  } catch (e) {
    document.getElementById('weatherContent').innerHTML = `<p style="color:var(--text-muted);">Unable to load weather. <a href="javascript:fetchWeather()">Retry</a></p>`;
  }
}

function getWeatherEmoji(code) {
  if (code <= 1) return "&#9728;&#65039;";
  if (code <= 3) return "&#9925;";
  if (code >= 51 && code <= 67) return "&#127783;&#65039;";
  if (code >= 71 && code <= 77) return "&#127784;&#65039;";
  if (code >= 80 && code <= 82) return "&#127783;&#65039;";
  if (code >= 85 && code <= 86) return "&#127784;&#65039;";
  if (code >= 95) return "&#9889;";
  if (code >= 45 && code <= 48) return "&#127787;&#65039;";
  return "&#9728;&#65039;";
}

function getWeatherDesc(code) {
  const map = {
    0: "Clear sky", 1: "Mainly clear", 2: "Partly cloudy", 3: "Overcast",
    45: "Fog", 48: "Depositing rime fog",
    51: "Light drizzle", 53: "Moderate drizzle", 55: "Dense drizzle",
    61: "Slight rain", 63: "Moderate rain", 65: "Heavy rain",
    71: "Slight snow", 73: "Moderate snow", 75: "Heavy snow",
    77: "Snow grains", 80: "Slight rain showers", 81: "Moderate rain showers",
    82: "Violent rain showers", 85: "Slight snow showers", 86: "Heavy snow showers",
    95: "Thunderstorm", 96: "Thunderstorm w/ slight hail", 99: "Thunderstorm w/ heavy hail"
  };
  return map[code] || "Unknown";
}

let selectedCategory = [];

function determineOutfitCategory() {
  // Daily-seeded selection from the full board — fresh every day
  return getTodaysOutfits();
}

function getOutfitReasonText() {
  if (!currentWeather) return "Loading weather to match your outfit...";

  const c = currentWeather.current;
  const d = currentWeather.daily;
  const high = Math.round(d.temperature_2m_max[0]);
  const low = Math.round(d.temperature_2m_min[0]);
  const code = c.weather_code;
  const isRainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;
  const isSnowy = (code >= 71 && code <= 77) || (code >= 85 && code <= 86);
  const swing = high - low;

  let reason = `Today's range: ${low}° to ${high}°`;
  if (isRainy) reason += " with rain";
  else if (isSnowy) reason += " with snow";
  reason += ". ";

  if (swing > 15) {
    reason += `That's a ${swing}° swing — layering will be your friend. `;
  }

  if (isCasualDay()) {
    reason += "Weekend (Fri–Sun) — pulling from your casual/weekend board.";
  } else {
    // Board follows the day's HIGH (max) temp — matches getTodaysOutfits().
    const tier = getWeatherTier(high);
    const tierLabel = { cold: 'cold-weather', cool: 'cool-weather', warm: 'warm-weather', hot: 'hot-weather' }[tier] || 'weather';
    reason += `Weekday — pulling from your ${tierLabel} board based on today's high of ${high}°.`;
  }

  return reason;
}

function getWeatherTag() {
  if (!currentWeather) return '';
  const high = currentWeather.daily.temperature_2m_max[0];
  const code = currentWeather.current.weather_code;
  const isRainy = (code >= 51 && code <= 67) || (code >= 80 && code <= 82) || code >= 95;

  if (isRainy) return '<span class="weather-match-tag tag-rain">Rain-Ready Pick</span>';
  if (hasLargeTempSwing()) return '<span class="weather-match-tag tag-cool">Layering Day Pick</span>';

  const tier = getWeatherTier(high);
  if (tier === 'cold') return '<span class="weather-match-tag tag-cold">Cold Weather Pick</span>';
  if (tier === 'cool') return '<span class="weather-match-tag tag-cool">Cool Weather Pick</span>';
  if (tier === 'warm') return '<span class="weather-match-tag tag-warm">Warm Weather Pick</span>';
  return '<span class="weather-match-tag tag-warm">Hot Weather Pick</span>';
}

function initOutfitDisplay() {
  selectedCategory = determineOutfitCategory();
  const strip = document.getElementById('outfitStrip');
  const display = document.getElementById('outfitDisplay');
  const displayWidth = display.offsetWidth;

  // Build strip with all outfits repeated for roulette effect
  let slidesHtml = '';
  const repeats = 4;
  for (let r = 0; r < repeats; r++) {
    selectedCategory.forEach(outfit => {
      slidesHtml += `<div class="outfit-slide" style="width:${displayWidth}px;min-width:${displayWidth}px;">
        <img src="${outfit.src}" alt="${outfit.label}" loading="lazy">
      </div>`;
    });
  }
  strip.innerHTML = slidesHtml;
  strip.style.transform = 'translateX(0px)';

  document.getElementById('outfitReason').textContent = getOutfitReasonText();
  document.getElementById('outfitLabel').innerHTML = `${selectedCategory.length} fresh looks from your board today!` + '<br>' + getWeatherTag();
}

function spinRoulette() {
  if (spinning) return;
  spinning = true;
  const btn = document.getElementById('spinBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner-icon">&#127922;</span> Spinning...';

  const strip = document.getElementById('outfitStrip');
  const display = document.getElementById('outfitDisplay');
  const displayWidth = display.offsetWidth;
  const totalSlides = selectedCategory.length;

  // Pick a random winner
  const winnerIdx = Math.floor(Math.random() * totalSlides);

  // Spin through 2-3 full cycles + land on winner
  const fullCycles = 2 + Math.floor(Math.random() * 2);
  const targetSlide = (fullCycles * totalSlides) + winnerIdx;
  const offset = targetSlide * displayWidth;

  strip.style.transition = 'transform 3.5s cubic-bezier(0.15, 0.6, 0.25, 1)';
  strip.style.transform = `translateX(-${offset}px)`;

  setTimeout(() => {
    spinning = false;
    btn.disabled = false;
    btn.innerHTML = '<span class="spinner-icon">&#127922;</span> Spin Again';
    const winner = selectedCategory[winnerIdx];
    document.getElementById('outfitLabel').innerHTML = `Pinterest inspo #${winnerIdx + 1}` + '<br>' + getWeatherTag();
  }, 3800);
}

// ============================================================
// BIORHYTHMS — Physical (23d), Emotional (28d), Intellectual (33d)
// ============================================================
function renderBiorhythms() {
  const birth = new Date(BIRTHDATE + 'T00:00:00');
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const dayMs = 86400000;
  const d0 = Math.round((today - birth) / dayMs);

  const cycles = [
    { name: 'Physical',     period: 23, color: '#7A2E3B' },
    { name: 'Emotional',    period: 28, color: '#6B7B3A' },
    { name: 'Intellectual', period: 33, color: '#2980B9' }
  ];

  const W = 520, H = 132, padX = 10, midY = H / 2, amp = H / 2 - 14, range = 14;
  const xFor = off => padX + ((off + 7) / range) * (W - 2 * padX);
  const yFor = v => midY - v * amp;

  let paths = '';
  cycles.forEach(c => {
    let d = '';
    for (let off = -7; off <= 7; off += 0.5) {
      const v = Math.sin(2 * Math.PI * (d0 + off) / c.period);
      d += (off === -7 ? 'M' : 'L') + xFor(off).toFixed(1) + ' ' + yFor(v).toFixed(1) + ' ';
    }
    paths += `<path d="${d}" fill="none" stroke="${c.color}" stroke-width="2.5" stroke-linecap="round" vector-effect="non-scaling-stroke"/>`;
  });

  const todayX = xFor(0);
  const svg = `<svg viewBox="0 0 ${W} ${H}" class="bio-chart" preserveAspectRatio="none">
    <line x1="${padX}" y1="${midY}" x2="${W - padX}" y2="${midY}" stroke="#E8E0D6" stroke-width="1" vector-effect="non-scaling-stroke"/>
    <line x1="${todayX}" y1="6" x2="${todayX}" y2="${H - 6}" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="4 3" vector-effect="non-scaling-stroke"/>
    ${paths}
  </svg>`;

  const legend = cycles.map(c => {
    const v = Math.sin(2 * Math.PI * d0 / c.period);
    const prev = Math.sin(2 * Math.PI * (d0 - 1) / c.period);
    const pct = Math.round(v * 100);
    const arrow = v >= prev ? '&#9650;' : '&#9660;';
    return `<div class="bio-chip"><span class="bio-dot" style="background:${c.color}"></span>${c.name} <span class="bio-pct">${pct > 0 ? '+' : ''}${pct}% ${arrow}</span></div>`;
  }).join('');

  document.getElementById('biorhythmContent').innerHTML = svg + `<div class="bio-legend">${legend}</div>`;
}

async function init() {
  updateGreeting();
  renderHoroscope();
  renderBiorhythms();
  renderCalendar();
  renderTasks();
  await fetchWeather();
  initOutfitDisplay();
}

init();
